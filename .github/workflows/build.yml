name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content VERSION -Raw
          $v = $v.Trim()
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild
        shell: cmd
        run: |
          msbuild AutoSaver.csproj /p:Configuration=Release /v:minimal /nologo

      - name: Prepare release assets
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.value }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item bin/Release/autosaver.exe "dist/AutoSaver-Setup-v$version.exe"
          Compress-Archive -Path bin/Release/autosaver.exe -DestinationPath "dist/AutoSaver-v$version.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autosaver-v${{ steps.version.outputs.value }}
          path: dist/*

      - name: Extract release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $releaseNotes = Get-Content CHANGELOG.md -Raw | Select-String -Pattern "(?ms)^##\s+\[$([regex]::Escape($version))\]\s*(?:-.*)?\r?\n(?<body>.*?)(?=^##\s+\[|\z)"
          if ($releaseNotes -and $releaseNotes.Matches.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($releaseNotes.Matches[0].Groups['body'].Value)) {
            $body = $releaseNotes.Matches[0].Groups['body'].Value.Trim()
          } else {
            $body = "Release notes for version $version are not available."
          }
          Set-Content -Path release-notes.md -Value $body -Encoding UTF8


      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: AutoSaver ${{ steps.version.outputs.value }}
          body_path: release-notes.md
          files: |
            dist/AutoSaver-Setup-v${{ steps.version.outputs.value }}.exe
            dist/AutoSaver-v${{ steps.version.outputs.value }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
