name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content VERSION -Raw
          $v = $v.Trim()
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild
        shell: cmd
        run: |
          msbuild AutoSaver.csproj /p:Configuration=Release /p:Platform="Any CPU" /v:minimal /nologo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autosaver-${{ steps.version.outputs.value }}
          path: bin/Release/autosaver.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: AutoSaver ${{ steps.version.outputs.value }}
          body_path: CHANGELOG.md
          files: bin/Release/autosaver.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
