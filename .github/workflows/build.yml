name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content VERSION -Raw
          $v = $v.Trim()
          echo "value=$v" >> $env:GITHUB_OUTPUT

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild
        shell: cmd
        run: |
          msbuild AutoSaver.csproj /p:Configuration=Release /v:minimal /nologo

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.value }}'
          # Chocolatey / Inno may install under x86 or "Program Files" depending on runner image.
          $candidates = @(
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe")
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe")
          )
          $iscc = $candidates | Where-Object { $_ -and (Test-Path -LiteralPath $_) } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe not found. Tried:`n  - $($candidates -join "`n  - ")"
          }
          Write-Host "Using ISCC: $iscc"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $iscc /DMyAppVersion=$ver "installer\autosaver.iss"

      - name: Package Portal (portable zip)
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.value }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipPath = "dist/AutoSaver-$ver-Portal.zip"
          Compress-Archive -Path @(
            "bin/Release/autosaver.exe",
            "bin/Release/app-icon.ico",
            "bin/Release/VERSION",
            "bin/Release/CHANGELOG.md"
          ) -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autosaver-${{ steps.version.outputs.value }}-packages
          path: |
            bin/Release/autosaver.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Setup.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Portal.zip

      - name: Extract release notes
        id: release_notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $releaseNotes = Get-Content CHANGELOG.md -Raw | Select-String -Pattern "(?ms)^##\s+\[$([regex]::Escape($version))\]\s*(?:-.*)?\r?\n(?<body>.*?)(?=^##\s+\[|\z)"
          if ($releaseNotes -and $releaseNotes.Matches.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($releaseNotes.Matches[0].Groups['body'].Value)) {
            $body = $releaseNotes.Matches[0].Groups['body'].Value.Trim()
          } else {
            $body = "Release notes for version $version are not available."
          }
          Set-Content -Path release-notes.md -Value $body -Encoding UTF8


      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: AutoSaver ${{ steps.version.outputs.value }}
          body_path: release-notes.md
          files: |
            bin/Release/autosaver.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Setup.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Portal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
