name: Build and Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $v = Get-Content VERSION -Raw
          $v = $v.Trim()
          echo "value=$v" >> $env:GITHUB_OUTPUT

      # Prevents Inno/dist paths (AutoSaver-{VERSION}-*) from diverging from the pushed tag.
      - name: Verify VERSION matches release tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $fromFile = '${{ steps.version.outputs.value }}'
          $tagVer = '${{ github.ref_name }}'.TrimStart('v')
          if ($tagVer -ne $fromFile) {
            Write-Error "VERSION file is '$fromFile' but tag is v$tagVer. Bump VERSION (and project versions) to match the tag before releasing."
            exit 1
          }

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: MSBuild
        shell: cmd
        run: |
          msbuild AutoSaver.csproj /p:Configuration=Release /v:minimal /nologo

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.value }}'
          # Chocolatey / Inno may install under x86 or "Program Files" depending on runner image.
          $candidates = @(
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe")
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe")
          )
          $iscc = $candidates | Where-Object { $_ -and (Test-Path -LiteralPath $_) } | Select-Object -First 1
          if (-not $iscc) {
            throw "ISCC.exe not found. Tried:`n  - $($candidates -join "`n  - ")"
          }
          Write-Host "Using ISCC: $iscc"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $iscc /DMyAppVersion=$ver "installer\autosaver.iss"

      - name: Package Portal (portable zip)
        shell: pwsh
        run: |
          $ver = '${{ steps.version.outputs.value }}'
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -LiteralPath "Resources/app-icon.ico" -Destination "bin/Release/app-icon.ico" -Force
          $zipPath = "dist/AutoSaver-$ver-Portal.zip"
          Compress-Archive -Path @(
            "bin/Release/autosaver.exe",
            "bin/Release/app-icon.ico",
            "bin/Release/VERSION"
          ) -DestinationPath $zipPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autosaver-${{ steps.version.outputs.value }}-packages
          if-no-files-found: warn
          path: |
            bin/Release/autosaver.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Setup.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Portal.zip

      - name: Extract release notes
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.value }}'
          $releaseNotes = Get-Content CHANGELOG.md -Raw | Select-String -Pattern "(?ms)^##\s+\[$([regex]::Escape($version))\]\s*(?:-.*)?\r?\n(?<body>.*?)(?=^##\s+\[|\z)"
          if ($releaseNotes -and $releaseNotes.Matches.Count -gt 0 -and -not [string]::IsNullOrWhiteSpace($releaseNotes.Matches[0].Groups['body'].Value)) {
            $body = $releaseNotes.Matches[0].Groups['body'].Value.Trim()
          } else {
            $body = "Release notes for version $version are not available."
          }
          Set-Content -Path release-notes.md -Value $body -Encoding UTF8

      # Do not pass multiline step outputs into `files:` — YAML/expression expansion can break the
      # softprops action. Use an explicit list + fail_on_unmatched_files (globs; exact paths OK).
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: AutoSaver ${{ steps.version.outputs.value }}
          body_path: release-notes.md
          fail_on_unmatched_files: false
          files: |
            bin/Release/autosaver.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Setup.exe
            dist/AutoSaver-${{ steps.version.outputs.value }}-Portal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
